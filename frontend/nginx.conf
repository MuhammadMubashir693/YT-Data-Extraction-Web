server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the backend container. "backend" is the service
    # name defined in docker-compose.yml — Docker's internal DNS resolves
    # it to the backend container's IP automatically.
    location /api/ {
        proxy_pass http://backend:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api-docs {
        proxy_pass http://backend:5000/api-docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Everything else: serve the built static app
    location / {
        try_files $uri $uri/ /index.html;
    }
}
